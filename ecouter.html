            margin: 0;
            height: 100vh;
        }

        h1 {
            color: #2c3e50;
            margin-top: 20px;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 50px;
            width: 450px;
            min-height: 260px;
        }

        .row {

            align-items: center;
            margin-bottom: 25px;
            min-height: 60px;
        }

        .flag {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border: 1px solid #ddd;
            margin-right: 20px;
            border-radius: 4px;
        }

        #display-word {

            font-weight: bold;
            color: #34495e;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 1.3rem;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            flex-grow: 1;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        #feedback-area {
            margin-top: 20px;
            text-align: center;
            min-height: 80px;
        }

        #feedback-text {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .correct { color: #27ae60; }
        .incorrect { color: #e74c3c; }
        .close { color: #d35400; }

        .instruction {
            color: #7f8c8d;
            font-size: 0.95rem;
            font-style: italic;
        }

        #accent-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            min-height: 40px;
        }

        .accent-btn {

            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .accent-hidden {
            visibility: hidden;
            pointer-events: none;
        }

        const topFlag = document.getElementById('top-flag');
        const bottomFlag = document.getElementById('bottom-flag');
        const displayWord = document.getElementById('display-word');
        const userInput = document.getElementById('user-input');
        const feedbackText = document.getElementById('feedback-text');
        const instructionText = document.getElementById('instruction-text');
        const accentRow = document.getElementById('accent-row');
        const scoreRightEl = document.getElementById('score-right');
        const scoreCloseEl = document.getElementById('score-close');
        const scoreWrongEl = document.getElementById('score-wrong');

        const FLAG_FR = "https://flagcdn.com/w80/fr.png";
        const FLAG_US = "https://flagcdn.com/w80/us.png";

        let currentWordPair = null;
        let targetWord = "";
        let isWaitingForNext = false;
        let countRight = 0;
        let countClose = 0;
        let countWrong = 0;

        function nextTurn() {
            // Reset state
            isWaitingForNext = false;
            userInput.value = "";
            userInput.readOnly = false; // Add this line
            userInput.focus();
            userInput.disabled = false;
            feedbackText.textContent = "";
            instructionText.textContent = "";
            feedbackText.className = "";
            
            // Pick random word
            currentWordPair = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            
            // Randomize direction (Top is French or Top is English)
            const isFrenchOnTop = Math.random() < 0.5;

            if (isFrenchOnTop) {
                topFlag.src = FLAG_FR;
                bottomFlag.src = FLAG_US;
                displayWord.textContent = currentWordPair.french;
                targetWord = currentWordPair.english;
                userInput.placeholder = "Translate...";
                accentRow.classList.add('accent-hidden');
            } else {
                topFlag.src = FLAG_US;
                bottomFlag.src = FLAG_FR;
                displayWord.textContent = currentWordPair.english;
                targetWord = currentWordPair.french;
                userInput.placeholder = "Traduisez...";
                accentRow.classList.remove('accent-hidden');
            }
            
            userInput.focus();
        }

        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                // Prevent the default browser behavior for Enter
                e.preventDefault();

                if (isWaitingForNext) {
                    nextTurn();
                } else if (userInput.value.trim() !== "") {
            checkAnswer();
                }
            }
	});

        // Helper to strip French accents for the first rule
        function removeAccents(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        // Returns true if the answer meets any of your three rules for being "Close"
        function isAnswerClose(user, target) {
            // Rule 1: Correct letters but missing/wrong accent marks
            if (removeAccents(user) === removeAccents(target)) {
                return true;
            }

            const lenU = user.length;
            const lenT = target.length;

            // Rule 2: Missing exactly one letter (or has exactly one extra letter)
            if (Math.abs(lenU - lenT) === 1) {
                let longer = lenU > lenT ? user : target;
                let shorter = lenU > lenT ? target : user;
                let i = 0, j = 0, errors = 0;
                while (i < longer.length && j < shorter.length) {
                    if (longer[i] !== shorter[j]) {
                        errors++;
                        i++; // skip the missing letter in the shorter string
                        if (errors > 1) break;
                    } else {
                        i++;
                        j++;
                    }
                }
                if (errors <= 1) return true;
            }

            // Rule 3: All correct letters, but two adjacent letters are reversed
            if (lenU === lenT) {
                let mismatches = [];
                for (let i = 0; i < lenT; i++) {
                    if (user[i] !== target[i]) {
                        mismatches.push(i);
                    }
                }
                // Exactly two mismatches means a single potential transposition swap
                if (mismatches.length === 2) {
                    const [i1, i2] = mismatches;
                    // Verify they are right next to each other and swapping them fixes the word
                    if (i2 - i1 === 1 && user[i1] === target[i2] && user[i2] === target[i1]) {
                        return true;
                    }
                }
            }

            return false;
        }

// Helper function to calculate Levenshtein Distance for "close" answers
function getLevenshteinDistance(a, b) {
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) {
                matrix[i][j] = matrix[i - 1][j - 1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i - 1][j - 1] + 1, // substitution
                    matrix[i][j - 1] + 1,     // insertion
                    matrix[i - 1][j] + 1      // deletion
                );
            }
        }
    }
    return matrix[b.length][a.length];
}

// Helper to determine if an answer is close enough (off by 1 for short words, 2 for longer)
function isCloseMatch(input, target) {
    const distance = getLevenshteinDistance(input, target);
    if (target.length <= 4) return distance <= 1;
    return distance <= 2;
}

function checkAnswer() {
    const answer = userInput.value.trim().toLowerCase();
    const isShowingFrench = (topFlag.src === FLAG_FR);
    
    // 1. Establish the primary correct answer
    const primaryTarget = isShowingFrench ? currentWordPair.english.toLowerCase() : currentWordPair.french.toLowerCase();
    
    // 2. Safely grab the alternate array, converting all elements to lowercase for matching
    let alternates = [];
    if (isShowingFrench && Array.isArray(currentWordPair.english_alt)) {
        alternates = currentWordPair.english_alt.map(word => word.toLowerCase());
    } else if (!isShowingFrench && Array.isArray(currentWordPair.french_alt)) {
        alternates = currentWordPair.french_alt.map(word => word.toLowerCase());
    }

    // --- EVALUATION LOGIC ---

    // Check for Exact Match (Primary or any value inside the alternate array)
    const hasExactAlternateMatch = alternates.includes(answer);

    if (answer === primaryTarget || hasExactAlternateMatch) {
        feedbackText.textContent = "Correct!";
        feedbackText.className = "correct";
        
        // Update Right Score
        countRight++;
        scoreRightEl.textContent = countRight;
    } 
    // Check for Close Match on the Primary target
    else if (isCloseMatch(answer, primaryTarget)) {
        feedbackText.textContent = `Close! The exact answer is: ${primaryTarget}`;
        feedbackText.className = "close"; // Updated class to match your CSS styling color
        
        // Update Close Score
        countClose++;
        scoreCloseEl.textContent = countClose;
    } 
    // Check for Close Match on any item inside the alternate array
    else {
        // Find if there is an alternate entry that is considered a "close match"
        const closeAlternate = alternates.find(altWord => isCloseMatch(answer, altWord));
        
        if (closeAlternate) {
            feedbackText.textContent = `Close! An acceptable answer is: ${closeAlternate}`;
            feedbackText.className = "close"; // Updated class to match your CSS styling color
            
            // Update Close Score
            countClose++;
            scoreCloseEl.textContent = countClose;
        } 
        // Completely Incorrect
        else {
            if (alternates.length > 0) {
                feedbackText.textContent = `Sorry: that's ${primaryTarget} (or ${alternates.join(', ')})`;
            } else {
                feedbackText.textContent = `Sorry: that's ${primaryTarget}`;
            }
            feedbackText.className = "incorrect";
            
            // Update Wrong Score
            countWrong++;
            scoreWrongEl.textContent = countWrong;
        }
    }

    instructionText.textContent = "Press Enter for the next word";
    userInput.readOnly = true;
    isWaitingForNext = true;
}
