<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Écoutez et répétez</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            height: 100vh;
        }

        h1 {
            color: #2c3e50;
            margin-top: 20px;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 50px;
            width: 450px;
            min-height: 260px;
        }

        .row {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            min-height: 60px;
        }

        .flag {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border: 1px solid #ddd;
            margin-right: 20px;
            border-radius: 4px;
        }

        #display-word {
            font-size: 1.6rem;
            font-weight: bold;
            color: #34495e;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 1.3rem;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            flex-grow: 1;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        #feedback-area {
            margin-top: 20px;
            text-align: center;
            min-height: 80px;
        }

        #feedback-text {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .correct { color: #27ae60; }
        .incorrect { color: #e74c3c; }
        .close { color: #d35400; }

        .instruction {
            color: #7f8c8d;
            font-size: 0.95rem;
            font-style: italic;
        }

        #accent-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            min-height: 40px;
        }

        .accent-btn {
            padding: 6px 12px;
            font-size: 1.1rem;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .accent-hidden {
            visibility: hidden;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <h1>Écoutez et répétez</h1>

    <div id="game-container">
        <div class="row">
            <img id="top-flag" class="flag" src="" alt="Flag">
            <div id="display-word"></div>
        </div>

        <div class="row">
            <img id="bottom-flag" class="flag" src="" alt="Flag">
            <input type="text" id="user-input" autocomplete="off" placeholder="Traduisez...">
        </div>

        <div id="accent-row">
            <button class="accent-btn">é</button>
            <button class="accent-btn">è</button>
            <button class="accent-btn">ê</button>
            <button class="accent-btn">à</button>
            <button class="accent-btn">ç</button>
        </div>

        <div id="feedback-area">
            <div id="feedback-text"></div>
            <div id="instruction-text" class="instruction"></div>
        </div>

        <div id="scoreboard" style="display: flex; justify-content: space-around; margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0; font-size: 1.1rem; font-weight: bold; color: #4a5568;">
            <div>Right: <span id="score-right" style="color: #27ae60;">0</span></div>
            <div>Close: <span id="score-close" style="color: #d35400;">0</span></div>
            <div>Wrong: <span id="score-wrong" style="color: #e74c3c;">0</span></div>
        </div>
    </div>

    <script>
        // Data definition
	const vocabulary = [
	    { id: 1, french: "comme", english: "as" },
	    { id: 2, french: "je", english: "I" },
 	    { id: 3, french: "son", english: "his" },
	    { id: 4, french: "que", english: "that" },
	    { id: 5, french: "il", english: "he" },
	    { id: 6, french: "était", english: "was" },
	    { id: 7, french: "pour", english: "for" },
	    { id: 8, french: "sur", english: "on" },
	    { id: 9, french: "sont", english: "are" },
	    { id: 10, french: "avec", english: "with" },
	    { id: 11, french: "ils", english: "they" },
	    { id: 12, french: "être", english: "be" },
	    { id: 13, french: "à", english: "at" },
 	    { id: 14, french: "un", english: "one" },
 	    { id: 15, french: "avoir", english: "have" },
	    { id: 16, french: "ce", english: "this" },
	    { id: 17, french: "à partir de", english: "from" },
	    { id: 18, french: "par", english: "by" },
	    { id: 19, french: "chaud", english: "hot" },
	    { id: 20, french: "mot", english: "word" }
	];

        const topFlag = document.getElementById('top-flag');
        const bottomFlag = document.getElementById('bottom-flag');
        const displayWord = document.getElementById('display-word');
        const userInput = document.getElementById('user-input');
        const feedbackText = document.getElementById('feedback-text');
        const instructionText = document.getElementById('instruction-text');
        const accentRow = document.getElementById('accent-row');
        const scoreRightEl = document.getElementById('score-right');
        const scoreCloseEl = document.getElementById('score-close');
        const scoreWrongEl = document.getElementById('score-wrong');

        const FLAG_FR = "https://flagcdn.com/w80/fr.png";
        const FLAG_US = "https://flagcdn.com/w80/us.png";

        let currentWordPair = null;
        let targetWord = "";
        let isWaitingForNext = false;
        let countRight = 0;
        let countClose = 0;
        let countWrong = 0;

        function nextTurn() {
            // Reset state
            isWaitingForNext = false;
            userInput.value = "";
            userInput.readOnly = false; // Add this line
            userInput.focus();
            userInput.disabled = false;
            feedbackText.textContent = "";
            instructionText.textContent = "";
            feedbackText.className = "";
            
            // Pick random word
            currentWordPair = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            
            // Randomize direction (Top is French or Top is English)
            const isFrenchOnTop = Math.random() < 0.5;

            if (isFrenchOnTop) {
                topFlag.src = FLAG_FR;
                bottomFlag.src = FLAG_US;
                displayWord.textContent = currentWordPair.french;
                targetWord = currentWordPair.english;
                userInput.placeholder = "Translate...";
                accentRow.classList.add('accent-hidden');
            } else {
                topFlag.src = FLAG_US;
                bottomFlag.src = FLAG_FR;
                displayWord.textContent = currentWordPair.english;
                targetWord = currentWordPair.french;
                userInput.placeholder = "Traduisez...";
                accentRow.classList.remove('accent-hidden');
            }
            
            userInput.focus();
        }

        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                // Prevent the default browser behavior for Enter
                e.preventDefault();

                if (isWaitingForNext) {
                    nextTurn();
                } else if (userInput.value.trim() !== "") {
            checkAnswer();
                }
            }
	});

        // Helper to strip French accents for the first rule
        function removeAccents(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        // Returns true if the answer meets any of your three rules for being "Close"
        function isAnswerClose(user, target) {
            // Rule 1: Correct letters but missing/wrong accent marks
            if (removeAccents(user) === removeAccents(target)) {
                return true;
            }

            const lenU = user.length;
            const lenT = target.length;

            // Rule 2: Missing exactly one letter (or has exactly one extra letter)
            if (Math.abs(lenU - lenT) === 1) {
                let longer = lenU > lenT ? user : target;
                let shorter = lenU > lenT ? target : user;
                let i = 0, j = 0, errors = 0;
                while (i < longer.length && j < shorter.length) {
                    if (longer[i] !== shorter[j]) {
                        errors++;
                        i++; // skip the missing letter in the shorter string
                        if (errors > 1) break;
                    } else {
                        i++;
                        j++;
                    }
                }
                if (errors <= 1) return true;
            }

            // Rule 3: All correct letters, but two adjacent letters are reversed
            if (lenU === lenT) {
                let mismatches = [];
                for (let i = 0; i < lenT; i++) {
                    if (user[i] !== target[i]) {
                        mismatches.push(i);
                    }
                }
                // Exactly two mismatches means a single potential transposition swap
                if (mismatches.length === 2) {
                    const [i1, i2] = mismatches;
                    // Verify they are right next to each other and swapping them fixes the word
                    if (i2 - i1 === 1 && user[i1] === target[i2] && user[i2] === target[i1]) {
                        return true;
                    }
                }
            }

            return false;
        }

        function checkAnswer() {
            const answer = userInput.value.trim().toLowerCase();
            const correct = targetWord.toLowerCase();

            if (answer === correct) {
                feedbackText.textContent = "Correct!";
                feedbackText.className = "correct";
                countRight++;
                scoreRightEl.textContent = countRight;
           } else if (isAnswerClose(answer, correct)) {
                // Handle the new close state
                feedbackText.textContent = `Close! The correct spelling is: ${targetWord}`;
                feedbackText.className = "close";
                countClose++;
                scoreCloseEl.textContent = countClose;
            } else {
                feedbackText.textContent = `Sorry: that's ${targetWord}`;
                feedbackText.className = "incorrect";
                countWrong++;
                scoreWrongEl.textContent = countWrong;
           }

            instructionText.textContent = "Press Enter for the next word";
            userInput.readOnly = true;
            isWaitingForNext = true;
            
            // Clear accent shortcuts for the feedback phase
            accentContainer.innerHTML = "";
        }

        document.querySelectorAll('.accent-btn').forEach(button => {
            button.addEventListener('click', () => {
                userInput.value += button.textContent;
                userInput.focus();
            });
        });

        // Start the game
        nextTurn();
    </script>
</body>
</html>
